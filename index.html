
<!DOCTYPE html>
<html>
<head>
    <title>Buka TTS Bisa</title>
</head>
<body>
    <h2>Membuka tantangan...</h2>
    <p>Jika aplikasi tidak terbuka otomatis, <a href="https://play.google.com/store/apps/details?id=com.jvan.ivanariwibawa.tts">klik di sini untuk download</a>.</p>

    <script>
        // Ambil parameter dari URL (seed & level)
        const urlParams = new URLSearchParams(window.location.search);
        const seed = urlParams.get('seed');
        const level = urlParams.get('level');

        // Skema khusus Android untuk memaksa buka aplikasi atau ke Play Store
        const intentUrl = `intent://orasembrono.github.io/ttsbislink/index.html?seed=${seed}&level=${level}#Intent;scheme=https;package=${packageName};S.browser_fallback_url=https://play.google.com/store/apps/details?id=${packageName};end`;
        // Eksekusi
        window.location.href = intentUrl;
    </script>
</body>
</html>
